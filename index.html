<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sukhman ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#000,#ff0080,#6a00ff,#000);
background-size:400% 400%;
animation:bg 8s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

.card{
width:90%;
max-width:400px;
padding:30px;
border-radius:30px;
text-align:center;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
box-shadow:0 0 40px hotpink;
animation:glow 2s infinite alternate;
z-index:10;
}

@keyframes glow{
from{box-shadow:0 0 20px hotpink;}
to{box-shadow:0 0 60px deeppink;}
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.yes{
background:#ff2e63;
color:white;
}

.no{
background:white;
color:black;
position:relative;
}

#loveMsg{
display:none;
font-size:22px;
margin-top:15px;
color:pink;
font-weight:bold;
}

.heart{
position:fixed;
font-size:25px;
pointer-events:none;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<audio id="song">
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="card">

<h1>Sukhman 💖<br>Will you be mine?</h1>

<p>
Mai tahnu like krda ❤️<br>
bt i can't ask directly to you...
</p>

<p>From Navi ✨</p>

<button class="yes" onclick="yesClick()">
YES ❤️
</button>

<button class="no" id="noBtn"
onmouseover="moveNo()"
ontouchstart="moveNo()">
NO 😜
</button>

<div id="loveMsg">
NAVI JI BANYI GAL ❤️❤️❤️ HOGI HAA ❤️
</div>

</div>

<script>

/* stars */
for(let i=0;i<150;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* crazy NO button */
function moveNo(){

let btn=document.getElementById("noBtn");

btn.style.position="absolute";

btn.style.left=Math.random()*80+"%";

btn.style.top=Math.random()*80+"%";

btn.style.transform=
`rotate(${Math.random()*720}deg)
scale(${0.8+Math.random()})`;

}

/* hearts */
function hearts(){

for(let i=0;i<80;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💖","😍","🥰"][Math.floor(Math.random()*4)];

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{
h.remove()
},4000);

}

}

/* yes click */
function yesClick(){

document.getElementById(
"song"
).play();

document.getElementById(
"loveMsg"
).style.display="block";

hearts();

/* notification */
fetch(
'https://api.pushover.net/1/messages.json',
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({

token:'am3g2syju4yajivhnvifhigd63sqcg',
user:'uej6ctdafuu8u3n23m3s9ky1qjm54k',
message:'NAVI JI BANYI GAL ❤️❤️❤️ HOGI HAA ❤️'

})
});

}

</script>

</body>
</html>
