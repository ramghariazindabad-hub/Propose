<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukhman ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
font-family:Segoe UI,sans-serif;
color:white;
}

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.card{
width:85%;
max-width:380px;
padding:30px;
border-radius:20px;
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
box-shadow:0 0 30px hotpink;
z-index:10;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
}

.yes{
background:#ff2e63;
color:white;
}

.no{
background:white;
color:black;
position:relative;
}

#loveMsg{
display:none;
font-size:25px;
margin-top:20px;
color:#ff6ba5;
}

.heart{
position:fixed;
font-size:25px;
animation:fall 4s linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>
<body>

<audio id="song">
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="card">

<h1>Sukhman ❤️<br>Will you be mine?</h1>

<p>
Mai tahnu like krda <br>
bt i can't ask directly to you ❤️
</p>

<p>From Navi 💖</p>

<button class="yes" onclick="yesClick()">YES</button>

<button class="no" id="noBtn"
onmouseover="moveNo()">
NO 😜
</button>

<div id="loveMsg">
NAVI JI BANYI GAL ❤️❤️❤️ HOGI HAA ❤️
</div>

</div>

<script>

for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

function moveNo(){

let btn=document.getElementById("noBtn");

btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";

}

function createHearts(){

for(let i=0;i<50;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*35)+"px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove()
},4000);

}

}

function yesClick(){

document.getElementById("loveMsg").style.display="block";

document.getElementById("song").play();

createHearts();

fetch(
'https://api.pushover.net/1/messages.json',
{
method:'POST',

headers:{
'Content-Type':
'application/x-www-form-urlencoded'
},

body:new URLSearchParams({

token:'YOUR_PUSHOVER_APP_TOKEN',

user:'uej6ctdafuu8u3n23m3s9ky1qjm54k',

message:'NAVI JI BANYI GAL ❤️❤️❤️ HOGI HAA ❤️'

})

});

}

</script>

</body>
</html>
